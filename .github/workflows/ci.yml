name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- PYTHON SETUP ----------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          pip install -r api/requirements.txt
          pip install pytest flake8

      - name: Run Python lint
        run: flake8 .

      - name: Run backend tests
        run: pytest

      # ---------------- NODE SETUP ----------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      # ---------------- HADOLINT (ALL SERVICES) ----------------
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile

      # ---------------- IMAGE TAGGING ----------------
      - name: Generate image tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ---------------- BUILD ALL IMAGES ----------------
      - name: Build images
        run: |
          docker build -t api:latest -t api:${{ env.TAG }} ./api
          docker build -t worker:latest -t worker:${{ env.TAG }} ./worker
          docker build -t frontend:latest -t frontend:${{ env.TAG }} ./frontend

      # ---------------- COMPOSE TEST ----------------
      - name: Run full stack
        run: |
          docker compose up -d
          sleep 20
          docker compose ps
          curl -f http://localhost:8000/health || exit 1
          docker compose down
        if: always()

      # ---------------- CLEANUP ----------------
      - name: Cleanup
        run: docker compose down
        if: always()
