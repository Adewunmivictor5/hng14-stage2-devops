
services:
  redis:
    image: redis:7
    restart: always

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M


  api:
    build: ./api
    restart: always

    ports:
      - "${API_PORT:-8000}:8000"

    environment:
      - REDIS_HOST=redis
      - API_PORT=${API_PORT:-8000}

    depends_on:
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M


  worker:
    build: ./worker
    restart: always

    environment:
      - REDIS_HOST=redis

    depends_on:
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M


  frontend:
    build: ./frontend
    restart: always

    ports:
      - "${FE_PORT:-3000}:3000"

    environment:
      - API_URL=http://api:${API_PORT:-8000}
      - PORT=${FE_PORT:-3000}

    depends_on:
      api:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
