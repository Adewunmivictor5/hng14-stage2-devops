version: "3.9"

services:
  redis:
    image: redis:7
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: ./api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
    networks:
      - appnet
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
    networks:
      - appnet

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
    networks:
      - appnet
    ports:
      - "3000:3000"

networks:
  appnet:
